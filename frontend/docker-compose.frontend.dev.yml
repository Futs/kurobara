services:
  # Frontend service (development mode)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000/api}
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
