version: '3.8'

services:
  # Frontend service (development mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - kurobara-network
    command: npm run dev

  # Backend service (development mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      # Add other environment variables your backend needs
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - kurobara-network
    command: npm run dev

networks:
  kurobara-network:
    driver: bridge
